name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # These checks depend on GitHub repository metadata or binary brand
          # assets. Keep them ignored so Codex can push text-only PRs; see
          # .github/REPOSITORY_SETTINGS.md for the settings/assets to add on
          # GitHub before submitting this repository to the default HACS store.
          ignore: brands description topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
