name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-manifest-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check manifest has no duplicate JSON keys
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def no_duplicates(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"Duplicate manifest key: {key}")
                  result[key] = value
              return result

          manifest_path = Path("custom_components/norish/manifest.json")
          with manifest_path.open(encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file, object_pairs_hook=no_duplicates)

          assert manifest["domain"] == "norish"
          assert manifest["config_flow"] is True
          assert manifest["documentation"] == "https://github.com/norish-recipes/norish-ha-integration"
          assert manifest["issue_tracker"] == "https://github.com/norish-recipes/norish-ha-integration/issues"
          PY

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # These checks depend on GitHub repository metadata or binary brand
          # assets. Keep them ignored so Codex can push text-only PRs; see
          # .github/REPOSITORY_SETTINGS.md for the settings/assets to add on
          # GitHub before submitting this repository to the default HACS store.
          ignore: brands description topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
